apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-processor
  namespace: payments
  labels:
    app: order-processor
    app.kubernetes.io/part-of: payment-processor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-processor
  template:
    metadata:
      labels:
        app: order-processor
        app.kubernetes.io/part-of: payment-processor
    spec:
      containers:
        - name: order-processor
          image: quay.io/afalossi/ts02-order-processor:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          resources:
            requests:
              memory: "128Mi"
              cpu: "75m"
            limits:
              memory: "256Mi"
              cpu: "150m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: order-processor
  namespace: payments
  labels:
    app: order-processor
    app.kubernetes.io/part-of: payment-processor
spec:
  selector:
    app: order-processor
  ports:
    - port: 8080
      targetPort: 8080
      name: http
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: order-processor
  namespace: payments
spec:
  selector:
    matchLabels:
      app: order-processor
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
