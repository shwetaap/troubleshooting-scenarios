apiVersion: v1
kind: Namespace
metadata:
  name: warehouse-ops
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-fulfillment-daemon
  namespace: warehouse-ops
  labels:
    app: order-fulfillment-daemon
    component: fulfillment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-fulfillment-daemon
  template:
    metadata:
      labels:
        app: order-fulfillment-daemon
    spec:
      containers:
      - name: fulfillment-container
        image: busybox:1.36@sha256:73aaf090f3d85aa34ee199857f03fa3a95c8ede2ffd4cc2cdb5b94e566b11662
        command: ["/bin/sh"]
        args:
        - -c
        - |
          if [ -z "${DEPLOY_ENV}" ]; then
            echo "Environment variable DEPLOY_ENV is undefined"
            exit 1
          fi
          while true; do echo hello; sleep 10; done
        securityContext:
          runAsNonRoot: true
          runAsUser: 65532
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
        resources:
          requests:
            cpu: "5m"
            memory: "32Mi"
