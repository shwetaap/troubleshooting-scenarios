- conversation_group_id: failing_api_openai
  tag: agentic_failing_api

  turns:
    - turn_id: turn_1
      proposal_spec:
        request: |
          Alert: PaymentErrorRateHigh (critical)
          Namespace: payments
          Description: Payment error rate is 100.00%, which exceeds the 15% threshold.
          Labels:
            alertname: PaymentErrorRateHigh
            namespace: payments
            severity: critical

          Investigate using the skill at /app/skills/cluster-troubleshoot/investigate-alert
        targetNamespaces:
          - payments
        tools:
          skills:
            - image: quay.io/afalossi/agentic-skills:latest
              paths:
                - /skills/cluster-troubleshoot/investigate-alert
        analysis:
          agent: default

      expected_proposal_status:
        phase: Completed
        conditions:
          - type: Analyzed
            status: "True"

      expected_outcome: >-
        Root cause: shared-services/reporting-service is repeatedly opening DB connections
        and not releasing them properly, exhausting PostgreSQL connection slots.
        payments/payments-api cannot obtain a DB connection and returns 503.
        if mentioned, reconciliation-service CrashLooping is a separate issue, NOT RELATED
        to the DB connection exhaustion.
        Fix: rollback, restart, or scale down reporting-service.

      turn_metrics:
        - "custom:proposal_status"
        - "custom:proposal_evaluation_correctness"
      turn_metrics_metadata:
        "custom:proposal_evaluation_correctness":
          threshold: 0.80

