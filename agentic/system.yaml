logging:
  source_level: DEBUG

core:
  max_threads: 1
  fail_on_invalid_data: true
  skip_on_failure: false

llm:
  provider: openai
  model: gpt-5.4-mini
  max_tokens: 1000
  cache_enabled: false

agents:
  enabled: true
  default:
    agent: eval_agent
    agent_config:
      timeout: 600
  eval_agent:
    type: proposal
    namespace: openshift-lightspeed
    auto_approve: true
    cleanup_proposals: false
    timeout: 600
    poll_interval: 5

storage:
  - type: file
    output_dir: ./eval_output
    enabled_outputs: [csv, json]

environment:
  LITELLM_LOG: ERROR
