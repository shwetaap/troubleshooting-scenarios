apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: shared-services
data:
  init.sql: |
    CREATE TABLE reports (
      id SERIAL PRIMARY KEY,
      status VARCHAR(20) NOT NULL DEFAULT 'completed',
      value NUMERIC
    );
    INSERT INTO reports (status, value)
    SELECT
      CASE WHEN random() < 0.3 THEN 'pending' ELSE 'completed' END,
      round((random() * 1000)::numeric, 2)
    FROM generate_series(1, 100);
    CREATE USER reporting WITH PASSWORD 'reporting123';
    GRANT SELECT ON ALL TABLES IN SCHEMA public TO reporting;

    CREATE USER payments WITH PASSWORD 'payments123';
    GRANT SELECT ON ALL TABLES IN SCHEMA public TO payments;

    ALTER SYSTEM SET max_connections = 20;
    SELECT pg_reload_conf();
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-exporter-config
  namespace: shared-services
data:
  queries.yaml: |
    global_connections:
      query: |
        SELECT
          sum(numbackends) as connections_total,
          (SELECT setting::int FROM pg_settings WHERE name = 'max_connections') as max_connections
        FROM pg_stat_database
      master: true
      metrics:
        - connections_total:
            usage: "GAUGE"
            description: "Total number of connections across all databases"
        - max_connections:
            usage: "GAUGE"
            description: "Maximum allowed connections server-wide"
    connection_states:
      query: |
        SELECT
          state,
          count(*) as connections
        FROM pg_stat_activity
        WHERE state IS NOT NULL
        GROUP BY state
      master: true
      metrics:
        - state:
            usage: "LABEL"
            description: "Connection state"
        - connections:
            usage: "GAUGE"
            description: "Number of connections in this state"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
  namespace: shared-services
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: shared-services
  labels:
    app: postgres
    app.kubernetes.io/part-of: payment-processor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
        app.kubernetes.io/part-of: payment-processor
    spec:
      containers:
        - name: postgres
          image: postgres:16
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-admin
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-admin
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              value: demo
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: init
              mountPath: /docker-entrypoint-initdb.d
        - name: postgres-exporter
          image: prometheuscommunity/postgres-exporter:v0.15.0
          ports:
            - containerPort: 9187
              name: metrics
          env:
            - name: DATA_SOURCE_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-admin
                  key: POSTGRES_USER
            - name: DATA_SOURCE_PASS
              valueFrom:
                secretKeyRef:
                  name: postgres-admin
                  key: POSTGRES_PASSWORD
            - name: DATA_SOURCE_URI
              value: "localhost:5432/demo?sslmode=disable"
            - name: PG_EXPORTER_EXTEND_QUERY_PATH
              value: "/etc/postgres_exporter/queries.yaml"
          volumeMounts:
            - name: postgres-exporter-config
              mountPath: /etc/postgres_exporter
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-data
        - name: init
          configMap:
            name: postgres-init
        - name: postgres-exporter-config
          configMap:
            name: postgres-exporter-config
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: shared-services
  labels:
    app: postgres
    app.kubernetes.io/part-of: payment-processor
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
      name: postgresql
    - port: 9187
      targetPort: 9187
      name: metrics
