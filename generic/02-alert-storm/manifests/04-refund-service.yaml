apiVersion: apps/v1
kind: Deployment
metadata:
  name: refund-service
  namespace: payments
  labels:
    app: refund-service
    app.kubernetes.io/part-of: payment-processor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: refund-service
  template:
    metadata:
      labels:
        app: refund-service
        app.kubernetes.io/part-of: payment-processor
    spec:
      containers:
        - name: refund-service
          image: quay.io/afalossi/ts02-refund-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: refund-service
  namespace: payments
  labels:
    app: refund-service
    app.kubernetes.io/part-of: payment-processor
spec:
  selector:
    app: refund-service
  ports:
    - port: 8080
      targetPort: 8080
      name: http
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: refund-service
  namespace: payments
spec:
  selector:
    matchLabels:
      app: refund-service
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
