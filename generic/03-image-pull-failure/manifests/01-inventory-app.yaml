---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-app
  namespace: inventory
  labels:
    app: inventory-app
    app.kubernetes.io/part-of: inventory-system
spec:
  replicas: 3
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: inventory-app
  template:
    metadata:
      labels:
        app: inventory-app
        app.kubernetes.io/part-of: inventory-system
    spec:
      containers:
        - name: inventory-app
          image: registry.redhat.io/ubi9/ubi:latest
          imagePullPolicy: Always
          command: ["python3", "-m", "http.server", "8080"]
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
